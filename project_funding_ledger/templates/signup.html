{% extends "base.html" %}

{% block title %}Create Account | Project Funding Ledger{% endblock %}

{% block content %}
<div class="card" id="signup-card">
    <div class="card-header">
        <h1 class="brand-title" id="signup-title">Create Account</h1>
        <p class="brand-subtitle" id="signup-subtitle">Register to manage your project funding</p>
    </div>
    
    <form method="POST" action="{{ url_for('auth.signup') }}" id="signup-form">
        <div class="form-group">
            <label class="form-label" for="fullname-input">Full Name</label>
            <input type="text" name="full_name" id="fullname-input" class="form-input" placeholder="Alex Morgan" required autocomplete="name">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="organization-input">Organization Affiliation</label>
            <input type="text" name="organization" id="organization-input" class="form-input" placeholder="e.g. NumPy Core, NumFOCUS" autocomplete="organization">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="email-input">Email Address</label>
            <input type="email" name="email" id="email-input" class="form-input" placeholder="alex@example.org" required autocomplete="email">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password-input">Password</label>
            <input type="password" name="password" id="password-input" class="form-input" placeholder="Minimum 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary" id="signup-submit-btn">Create Account</button>
    </form>
    
    <div class="card-footer" id="signup-footer">
        Already have an account? <a href="{{ url_for('auth.login') }}" id="login-link">Sign In</a>
    </div>
</div>
{% endblock %}
