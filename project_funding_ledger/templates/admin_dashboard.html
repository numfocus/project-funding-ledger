{% extends "base.html" %}

{% block title %}Admin Dashboard | Project Funding Ledger{% endblock %}

{% block head %}
<!-- Tailwind CSS via CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- FontAwesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- React 18 & ReactDOM 18 -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<!-- Babel for JSX compiler -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
    // Customize Tailwind color scheme
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand: {
                        50: '#f0f9ff',
                        100: '#e0f2fe',
                        500: '#0ea5e9',
                        600: '#0284c7',
                        700: '#0369a1',
                        800: '#075985',
                        950: '#082f49',
                    }
                }
            }
        }
    }
</script>

<style>
    /* Avoid clashes with main stylesheet */
    body {
        background-color: #f8fafc;
        color: #0f172a !important; /* slate-900 */
        font-family: 'Inter', sans-serif;
    }
    main {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }
    /* Enforce dark text inside inputs, select boxes, and textareas */
    input, select, textarea {
        color: #0f172a !important; /* slate-900 */
    }
    /* Ensure disabled input elements are readable and have a solid gray background */
    input:disabled, select:disabled {
        color: #475569 !important; /* slate-600 */
        background-color: #f1f5f9 !important; /* slate-100 background */
    }
    /* Increase contrast for text-slate-400 and text-slate-500 classes */
    .text-slate-400 {
        color: #334155 !important; /* slate-700 */
    }
    .text-slate-500 {
        color: #0f172a !important; /* slate-900 */
    }
</style>
{% endblock %}

{% block content %}
<div id="admin-dashboard-root"></div>

<!-- React App compiled in-browser via Babel -->
<script type="text/babel">
{% raw %}
    const { useState, useEffect } = React;

    const formatValue = (field, val) => {
        if (val === undefined || val === null) return 'N/A';
        if (field && field.startsWith('overhead_')) {
            return (Math.round(Number(val) * 10000) / 100) + '%';
        }
        return String(val);
    };

    function AdminDashboardApp() {
        const [view, setView] = useState('dashboard'); // 'dashboard', 'batches', 'batch-preview'
        const [selectedBatchId, setSelectedBatchId] = useState(null);
        const [selectedBatchRows, setSelectedBatchRows] = useState([]);
        const [selectedBatchInfo, setSelectedBatchInfo] = useState(null);
        const [organizations, setOrganizations] = useState([]);
        const [batches, setBatches] = useState([]);
        const [loading, setLoading] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [showUploadModal, setShowUploadModal] = useState(false);
        const [uploadFile, setUploadFile] = useState(null);
        const [uploading, setUploading] = useState(false);
        const [uploadError, setUploadError] = useState(null);
        const [activeBannerBatch, setActiveBannerBatch] = useState(null);

        // User management state
        const [users, setUsers] = useState([]);
        const [userSearchTerm, setUserSearchTerm] = useState('');
        const [showUserModal, setShowUserModal] = useState(false);
        const [editingUser, setEditingUser] = useState(null);
        const [userForm, setUserForm] = useState({ email: '', full_name: '', user_type: 'Organization Stakeholder', status: 'Invited' });
        const [userModalError, setUserModalError] = useState(null);
        
        // Organization Access state
        const [userPermissions, setUserPermissions] = useState([]);
        const [loadingPermissions, setLoadingPermissions] = useState(false);
        const [selectedOrgId, setSelectedOrgId] = useState('');
        const [selectedPermLevel, setSelectedPermLevel] = useState('View');
        const [permissionError, setPermissionError] = useState(null);
 
        // Fetch dashboard data
        useEffect(() => {
            fetchOrganizations();
            fetchBatches();
            fetchUsers();
        }, []);

        // Detect if there's any batch with pending rows for the banner
        useEffect(() => {
            const pendingBatch = batches.find(b => b.pending_count > 0);
            setActiveBannerBatch(pendingBatch || null);
        }, [batches]);

        const fetchOrganizations = async () => {
            try {
                const res = await fetch('/api/admin/organizations');
                if (res.ok) {
                    const data = await res.json();
                    setOrganizations(data);
                }
            } catch (err) {
                console.error("Failed to fetch organizations:", err);
            }
        };

        const fetchBatches = async () => {
            try {
                const res = await fetch('/api/admin/imports/batches');
                if (res.ok) {
                    const data = await res.json();
                    setBatches(data);
                }
            } catch (err) {
                console.error("Failed to fetch batches:", err);
            }
        };

        const fetchUsers = async () => {
            try {
                const res = await fetch('/api/admin/users');
                if (res.ok) {
                    const data = await res.json();
                    setUsers(data);
                }
            } catch (err) {
                console.error("Failed to fetch users:", err);
            }
        };

        const fetchUserPermissions = async (userId) => {
            setLoadingPermissions(true);
            setPermissionError(null);
            try {
                const res = await fetch(`/api/admin/users/${userId}/permissions`);
                if (res.ok) {
                    const data = await res.json();
                    setUserPermissions(data);
                } else {
                    console.error("Failed to fetch permissions");
                }
            } catch (err) {
                console.error("Error fetching permissions:", err);
            } finally {
                setLoadingPermissions(false);
            }
        };

        const openUserModal = (user) => {
            setSelectedOrgId('');
            setPermissionError(null);
            if (user) {
                setEditingUser(user);
                setUserForm({
                    email: user.email,
                    full_name: user.full_name,
                    user_type: user.user_type,
                    status: user.status
                });
                setSelectedPermLevel(user.user_type === 'Program Manager' ? 'Edit Metadata' : 'View');
                fetchUserPermissions(user.id);
            } else {
                setEditingUser(null);
                setUserForm({
                    email: '',
                    full_name: '',
                    user_type: 'Organization Stakeholder',
                    status: 'Invited'
                });
                setSelectedPermLevel('View');
                setUserPermissions([]);
            }
            setUserModalError(null);
            setShowUserModal(true);
        };

        const handleAddPermission = async (e) => {
            e.preventDefault();
            if (!selectedOrgId) return;
            setPermissionError(null);
            try {
                const res = await fetch(`/api/admin/users/${editingUser.id}/permissions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        organization_id: selectedOrgId,
                        permission_level: selectedPermLevel
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    setSelectedOrgId('');
                    fetchUserPermissions(editingUser.id);
                } else {
                    setPermissionError(data.error || "Failed to add permission");
                }
            } catch (err) {
                setPermissionError("Network error.");
            }
        };

        const handleRevokePermission = async (permId) => {
            if (!confirm("Are you sure you want to revoke this user's access to this organization?")) return;
            setPermissionError(null);
            try {
                const res = await fetch(`/api/admin/users/permissions/${permId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (res.ok) {
                    fetchUserPermissions(editingUser.id);
                } else {
                    alert(data.error || "Failed to revoke permission");
                }
            } catch (err) {
                alert("Network error.");
            }
        };

        const handleUserSubmit = async (e) => {
            e.preventDefault();
            setUserModalError(null);
            
            const url = editingUser ? `/api/admin/users/${editingUser.id}` : '/api/admin/users';
            const method = editingUser ? 'PUT' : 'POST';
            
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userForm)
                });
                const data = await res.json();
                if (res.ok) {
                    setShowUserModal(false);
                    fetchUsers();
                } else {
                    setUserModalError(data.error || "An error occurred.");
                }
            } catch (err) {
                setUserModalError("Network error.");
            }
        };

        const handleDeleteUser = async (userId) => {
            if (!confirm("Are you sure you want to delete this user profile?")) return;
            try {
                const res = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    setShowUserModal(false);
                    fetchUsers();
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to delete user profile.");
                }
            } catch (err) {
                console.error("Failed to delete user:", err);
            }
        };


        const handleUpload = async (e) => {
            e.preventDefault();
            if (!uploadFile) return;
            setUploading(true);
            setUploadError(null);

            const formData = new FormData();
            formData.append('file', uploadFile);

            try {
                const res = await fetch('/admin/import/organizations', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    setShowUploadModal(false);
                    setUploadFile(null);
                    // Refresh data
                    await fetchBatches();
                    // Redirect to the newly created batch preview
                    viewBatchPreview(data.batch_id);
                } else {
                    setUploadError(data.error || "Failed to upload spreadsheet.");
                }
            } catch (err) {
                setUploadError("Network error during file upload.");
            } finally {
                setUploading(false);
            }
        };

        const viewBatchPreview = async (batchId) => {
            setLoading(true);
            try {
                const res = await fetch(`/admin/import/organizations/batches/${batchId}`);
                if (res.ok) {
                    const data = await res.json();
                    setSelectedBatchInfo(data.batch);
                    setSelectedBatchRows(data.rows);
                    setSelectedBatchId(batchId);
                    setView('batch-preview');
                }
            } catch (err) {
                console.error("Failed to fetch batch preview:", err);
            } finally {
                setLoading(false);
            }
        };

        const handleConfirmRow = async (rowId) => {
            try {
                const res = await fetch(`/admin/import/organizations/rows/${rowId}/confirm`, {
                    method: 'POST'
                });
                if (res.ok) {
                    // Update UI status immediately to reflect confirmation task enqueued
                    setSelectedBatchRows(prev =>
                        prev.map(r => r.id === rowId ? { ...r, status: 'Confirmed' } : r)
                    );
                    // Wait a bit and refresh batches to update the banner stats
                    setTimeout(() => {
                        fetchBatches();
                        // Refetch details to see if status updated in DB
                        if (selectedBatchId) viewBatchPreview(selectedBatchId);
                    }, 2000);
                }
            } catch (err) {
                console.error("Failed to confirm row:", err);
            }
        };

        const handleCancelRow = async (rowId) => {
            try {
                const res = await fetch(`/admin/import/organizations/rows/${rowId}/cancel`, {
                    method: 'POST'
                });
                if (res.ok) {
                    setSelectedBatchRows(prev =>
                        prev.map(r => r.id === rowId ? { ...r, status: 'Cancelled' } : r)
                    );
                    fetchBatches();
                }
            } catch (err) {
                console.error("Failed to cancel row:", err);
            }
        };

        const handleConfirmAll = async () => {
            if (!confirm("Are you sure you want to confirm and apply all pending edits in this batch?")) return;
            try {
                const res = await fetch(`/admin/import/organizations/batches/${selectedBatchId}/confirm-all`, {
                    method: 'POST'
                });
                if (res.ok) {
                    setSelectedBatchRows(prev =>
                        prev.map(r => r.status === 'Pending' ? { ...r, status: 'Confirmed' } : r)
                    );
                    setTimeout(() => {
                        fetchBatches();
                        if (selectedBatchId) viewBatchPreview(selectedBatchId);
                    }, 2000);
                }
            } catch (err) {
                console.error("Failed to confirm all:", err);
            }
        };

        const handleCancelAll = async () => {
            if (!confirm("Are you sure you want to cancel all remaining pending/error edits in this batch?")) return;
            try {
                const res = await fetch(`/admin/import/organizations/batches/${selectedBatchId}/cancel-all`, {
                    method: 'POST'
                });
                if (res.ok) {
                    setSelectedBatchRows(prev =>
                        prev.map(r => ['Pending', 'Error'].includes(r.status) ? { ...r, status: 'Cancelled' } : r)
                    );
                    fetchBatches();
                }
            } catch (err) {
                console.error("Failed to cancel all:", err);
            }
        };

        // Filtered organizations list
        const filteredOrgs = organizations.filter(org => 
            org.organization_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            org.organization_slug.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (org.description && org.description.toLowerCase().includes(searchTerm.toLowerCase()))
        );

        // Filtered users list
        const filteredUsers = users.filter(u => 
            u.full_name.toLowerCase().includes(userSearchTerm.toLowerCase()) ||
            u.email.toLowerCase().includes(userSearchTerm.toLowerCase())
        );


        return (
            <div className="min-h-screen flex flex-col bg-slate-50">
                {/* Active Import Banner */}
                {activeBannerBatch && (
                    <div className="bg-gradient-to-r from-amber-500 to-orange-600 text-white py-3 px-6 shadow-md flex items-center justify-between transition-all duration-300 animate-pulse">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-box-archive text-xl"></i>
                            <span className="font-medium text-sm sm:text-base">
                                Import Staging Active: Batch <strong className="underline">{activeBannerBatch.file_name}</strong> has <strong>{activeBannerBatch.pending_count}</strong> pending row approvals.
                            </span>
                        </div>
                        <button 
                            onClick={() => viewBatchPreview(activeBannerBatch.id)}
                            className="bg-white text-orange-600 hover:bg-orange-50 font-semibold px-4 py-1.5 rounded-lg shadow text-xs sm:text-sm transition duration-150"
                        >
                            Review & Approve <i className="fa-solid fa-arrow-right ml-1"></i>
                        </button>
                    </div>
                )}

                {/* Dashboard Nav Header */}
                <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="bg-brand-950 text-white p-2 rounded-lg flex items-center justify-center">
                                <i className="fa-solid fa-wallet text-xl"></i>
                            </div>
                            <span className="font-bold text-xl text-slate-800 tracking-tight">Funding Ledger Admin</span>
                        </div>
                        <nav className="flex items-center gap-6">
                            <button 
                                onClick={() => setView('dashboard')}
                                className={`text-sm font-semibold transition py-2 border-b-2 ${view === 'dashboard' ? 'text-brand-700 border-brand-600' : 'text-slate-500 border-transparent hover:text-slate-800'}`}
                            >
                                <i className="fa-solid fa-building-ngo mr-1.5"></i> Organizations
                            </button>
                            <button 
                                onClick={() => setView('batches')}
                                className={`text-sm font-semibold transition py-2 border-b-2 ${view === 'batches' || view === 'batch-preview' ? 'text-brand-700 border-brand-600' : 'text-slate-500 border-transparent hover:text-slate-800'}`}
                            >
                                <i className="fa-solid fa-file-import mr-1.5"></i> Import Sessions
                            </button>
                            <button 
                                onClick={() => { setView('users'); fetchUsers(); }}
                                className={`text-sm font-semibold transition py-2 border-b-2 ${view === 'users' ? 'text-brand-700 border-brand-600' : 'text-slate-500 border-transparent hover:text-slate-800'}`}
                            >
                                <i className="fa-solid fa-users mr-1.5"></i> User Profiles
                            </button>
                            <a href="/profile" className="text-slate-500 hover:text-slate-800 text-sm font-semibold flex items-center gap-1">
                                <i className="fa-solid fa-user-circle text-lg"></i> Profile
                            </a>
                        </nav>
                    </div>
                </header>

                {/* Dashboard Content */}
                <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    {view === 'dashboard' && (
                        <div>
                            {/* Summary Stats */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:shadow transition duration-200">
                                    <div>
                                        <span className="text-slate-400 text-xs font-semibold uppercase tracking-wider">Total Organizations</span>
                                        <h3 className="text-3xl font-extrabold text-slate-800 mt-1">{organizations.length}</h3>
                                    </div>
                                    <div className="bg-brand-50 text-brand-600 p-4 rounded-xl">
                                        <i className="fa-solid fa-building text-2xl"></i>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:shadow transition duration-200">
                                    <div>
                                        <span className="text-slate-400 text-xs font-semibold uppercase tracking-wider">Fiscal Sponsorships</span>
                                        <h3 className="text-3xl font-extrabold text-slate-800 mt-1">
                                            {organizations.filter(o => o.organization_type === 'Fiscal Sponsorship').length}
                                        </h3>
                                    </div>
                                    <div className="bg-emerald-50 text-emerald-600 p-4 rounded-xl">
                                        <i className="fa-solid fa-handshake-angle text-2xl"></i>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:shadow transition duration-200">
                                    <div>
                                        <span className="text-slate-400 text-xs font-semibold uppercase tracking-wider">Import Batches</span>
                                        <h3 className="text-3xl font-extrabold text-slate-800 mt-1">{batches.length}</h3>
                                    </div>
                                    <div className="bg-indigo-50 text-indigo-600 p-4 rounded-xl">
                                        <i className="fa-solid fa-history text-2xl"></i>
                                    </div>
                                </div>
                            </div>

                            {/* Header Panel */}
                            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                                <div className="relative flex-1 max-w-md">
                                    <i className="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Search organizations..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm text-sm"
                                    />
                                </div>
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={() => setView('batches')}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-5 py-2.5 rounded-xl border border-slate-200 shadow-sm text-sm transition flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-history"></i> View Imports
                                    </button>
                                    <button 
                                        onClick={() => setShowUploadModal(true)}
                                        className="bg-brand-700 hover:bg-brand-800 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md text-sm transition flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-file-excel text-lg"></i> Import Organizations
                                    </button>
                                </div>
                            </div>

                            {/* Organizations Table Card */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                                                <th className="py-4 px-6">Organization Details</th>
                                                <th className="py-4 px-6">Type</th>
                                                <th className="py-4 px-6">Overhead Rates</th>
                                                <th className="py-4 px-6">Join Date</th>
                                                <th className="py-4 px-6">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm text-slate-600">
                                            {filteredOrgs.length > 0 ? (
                                                filteredOrgs.map(org => (
                                                    <tr key={org.id} className="hover:bg-slate-50/50 transition">
                                                        <td className="py-4 px-6">
                                                            <div className="font-semibold text-slate-800 text-base">{org.organization_name}</div>
                                                            <div className="text-slate-400 text-xs font-mono mt-0.5">slug: {org.organization_slug}</div>
                                                            {org.description && (
                                                                <p className="text-slate-400 text-xs mt-1 max-w-md line-clamp-1">{org.description}</p>
                                                            )}
                                                        </td>
                                                        <td className="py-4 px-6">
                                                            <span className={`px-2.5 py-1 rounded-full text-xs font-semibold inline-block ${org.organization_type === 'Event' ? 'bg-indigo-50 text-indigo-600 border border-indigo-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`}>
                                                                {org.organization_type}
                                                            </span>
                                                        </td>
                                                        <td className="py-4 px-6 font-mono text-xs">
                                                            <div>Grant: {Math.round((org.overhead_grant || 0) * 10000) / 100}%</div>
                                                            <div>Gen Don: {Math.round((org.overhead_donation_general || 0) * 10000) / 100}%</div>
                                                            <div>Corp Don: {Math.round((org.overhead_donation_corporate || 0) * 10000) / 100}%</div>
                                                        </td>
                                                        <td className="py-4 px-6 text-slate-500 font-mono text-xs">
                                                            {org.join_date || 'N/A'}
                                                        </td>
                                                        <td className="py-4 px-6">
                                                            <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${org.status === 'Active' ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-100 text-slate-600'}`}>
                                                                <span className={`h-1.5 w-1.5 rounded-full ${org.status === 'Active' ? 'bg-emerald-500' : 'bg-slate-400'}`}></span>
                                                                {org.status}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))
                                            ) : (
                                                <tr>
                                                    <td colSpan="5" className="py-12 text-center text-slate-400 font-semibold">
                                                        No organizations found.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'batches' && (
                        <div>
                            {/* Header Panel */}
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-800">Spreadsheet Import History</h2>
                                    <p className="text-slate-400 text-sm mt-0.5">List of all organization import batches uploaded by administrators</p>
                                </div>
                                <button 
                                    onClick={() => setShowUploadModal(true)}
                                    className="bg-brand-700 hover:bg-brand-800 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md text-sm transition flex items-center gap-2"
                                >
                                    <i className="fa-solid fa-file-excel text-lg"></i> Import Organizations
                                </button>
                            </div>

                            {/* Batches Table Card */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                                                <th className="py-4 px-6">File Details</th>
                                                <th className="py-4 px-6">Created At</th>

                                        value={userForm.email}
                                        onChange={(e) => setUserForm(prev => ({ ...prev, email: e.target.value }))}
                                        className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm text-sm disabled:bg-slate-50 disabled:text-slate-400"
                                        placeholder="jane.doe@example.com"
                                        required
                                        disabled={!!editingUser}
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-slate-500 text-xs font-semibold uppercase tracking-wider block">User Role</label>
                                        <select 
                                            value={userForm.user_type}
                                            onChange={(e) => {
                                                const nextRole = e.target.value;
                                                setUserForm(prev => ({ ...prev, user_type: nextRole }));
                                                if (nextRole === 'Program Manager') {
                                                    setSelectedPermLevel('Edit Metadata');
                                                } else if (nextRole === 'Organization Stakeholder') {
                                                    setSelectedPermLevel('View');
                                                }
                                            }}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm text-sm"
                                        >
                                            <option value="Organization Stakeholder">Organization Stakeholder</option>
                                            <option value="Program Manager">Program Manager</option>
                                            <option value="System Administrator">System Administrator</option>
                                        </select>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-slate-500 text-xs font-semibold uppercase tracking-wider block">Status</label>
                                        <select 
                                            value={userForm.status}
                                            onChange={(e) => setUserForm(prev => ({ ...prev, status: e.target.value }))}
                                            className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm text-sm disabled:bg-slate-50 disabled:text-slate-400"
                                            disabled={!editingUser}
                                        >
                                            <option value="Invited">Invited</option>
                                            <option value="Active">Active</option>
                                            <option value="Inactive">Inactive</option>
                                            <option value="Suspended">Suspended</option>
                                        </select>
                                    </div>
                                </div>

                                {/* Organization Access Section */}
                                {editingUser && (
                                    <div className="border-t border-slate-100 pt-4 space-y-4">
                                        <h4 className="font-bold text-slate-800 text-sm flex items-center gap-1.5">
                                            <i className="fa-solid fa-key text-brand-600"></i>
                                            Organization Access Control
                                        </h4>
                                        
                                        {userForm.user_type === 'System Administrator' ? (
                                            <div className="bg-brand-50 border border-brand-100 rounded-xl p-3 text-xs text-brand-800 flex items-center gap-2">
                                                <i className="fa-solid fa-circle-info text-base"></i>
                                                <span>System Administrators automatically have access to all organizations.</span>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {/* Permission List */}
                                                <div className="bg-slate-50 border border-slate-100 rounded-xl p-3 max-h-40 overflow-y-auto space-y-2">
                                                    {loadingPermissions ? (
                                                        <div className="text-center py-4 text-xs text-slate-400 font-semibold">
                                                            <i className="fa-solid fa-spinner animate-spin"></i> Loading permissions...
                                                        </div>
                                                    ) : userPermissions.length > 0 ? (
                                                        userPermissions.map(p => (
                                                            <div key={p.id} className="bg-white border border-slate-100 rounded-lg p-2.5 flex items-center justify-between shadow-sm">
                                                                <div>
                                                                    <span className="font-semibold text-slate-800 text-xs">{p.organization ? p.organization.organization_name : 'Unknown Org'}</span>
                                                                    <span className="ml-2 px-1.5 py-0.5 rounded text-[10px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-100">
                                                                        {p.permission_level}
                                                                    </span>
                                                                </div>
                                                                <button
                                                                    type="button"
                                                                    onClick={() => handleRevokePermission(p.id)}
                                                                    className="text-rose-500 hover:text-rose-700 hover:bg-rose-50 p-1.5 rounded transition text-xs flex items-center justify-center"
                                                                    title="Revoke Access"
                                                                >
                                                                    <i className="fa-solid fa-trash-can"></i>
                                                                </button>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <div className="text-center py-4 text-xs text-slate-400 font-semibold">
                                                            No explicit organization access granted.
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Add Permission Form */}
                                                {permissionError && (
                                                    <div className="bg-red-50 text-red-800 p-2.5 rounded-lg border border-red-100 text-xs">
                                                        {permissionError}
                                                    </div>
                                                )}

                                                <div className="flex gap-2 items-end">
                                                    <div className="flex-1 space-y-1">
                                                        <label className="text-slate-500 text-[10px] font-semibold uppercase tracking-wider block">Grant Organization</label>
                                                        <select
                                                            value={selectedOrgId}
                                                            onChange={(e) => setSelectedOrgId(e.target.value)}
                                                            className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-white text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm"
                                                        >
                                                            <option value="">-- Select Organization --</option>
                                                            {organizations
                                                                .filter(org => !userPermissions.some(p => p.organization_id === org.id))
                                                                .map(org => (
                                                                    <option key={org.id} value={org.id}>{org.organization_name}</option>
                                                                ))
                                                            }
                                                        </select>
                                                    </div>

                                                    <div className="w-28 space-y-1">
                                                        <label className="text-slate-500 text-[10px] font-semibold uppercase tracking-wider block">Level</label>
                                                        <select
                                                            value={selectedPermLevel}
                                                            onChange={(e) => setSelectedPermLevel(e.target.value)}
                                                            className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-white text-xs focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm"
                                                        >
                                                            <option value="View">View</option>
                                                            <option value="Edit Metadata">Edit Metadata</option>
                                                            <option value="Manage">Manage</option>
                                                        </select>
                                                    </div>

                                                    <button
                                                        type="button"
                                                        onClick={handleAddPermission}
                                                        disabled={!selectedOrgId}
                                                        className="bg-brand-700 hover:bg-brand-800 disabled:bg-brand-300 text-white font-semibold px-4 py-2 rounded-lg text-xs transition shadow-sm h-[34px] flex items-center justify-center"
                                                    >
                                                        Grant
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="flex items-center justify-between pt-4 border-t border-slate-100">
                                    {editingUser ? (
                                        <button 
                                            type="button"
                                            onClick={() => handleDeleteUser(editingUser.id)}
                                            className="bg-rose-50 hover:bg-rose-100 text-rose-600 font-semibold px-4 py-2.5 rounded-xl text-sm transition border border-rose-200 flex items-center gap-1.5 shadow-sm"
                                        >
                                            <i className="fa-solid fa-trash-can"></i> Delete Profile
                                        </button>
                                    ) : <div />}
                                    <div className="flex items-center gap-3">
                                        <button 
                                            type="button"
                                            onClick={() => { setShowUserModal(false); setUserModalError(null); }}
                                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-5 py-2.5 rounded-xl text-sm transition"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            type="submit"
                                            className="bg-brand-700 hover:bg-brand-800 text-white font-semibold px-6 py-2.5 rounded-xl shadow-md text-sm transition"
                                        >
                                            {editingUser ? "Save Changes" : "Create Profile"}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('admin-dashboard-root'));
    root.render(<AdminDashboardApp />);
{% endraw %}
</script>
{% endblock %}
